<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexVault — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--black:#010208;--blue:#0ea5e9;--blue-bright:#38bdf8;--gold:#f59e0b;--gold-bright:#fbbf24;--white:#f0f9ff;--muted:#94a3b8;--glass:rgba(14,165,233,0.05);--glass-border:rgba(14,165,233,0.2);--red:#ef4444;--green:#22c55e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:none}
#particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.grid-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(14,165,233,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.03) 1px,transparent 1px);background-size:60px 60px}
.scan-line{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);opacity:0.3;z-index:2;pointer-events:none;animation:scan 8s linear infinite}
@keyframes scan{0%{top:0;opacity:0.3}90%{opacity:0.3}100%{top:100vh;opacity:0}}
.corner-tl,.corner-br{position:fixed;width:60px;height:60px;pointer-events:none;z-index:2}
.corner-tl{top:20px;left:20px;border-top:1px solid rgba(14,165,233,0.4);border-left:1px solid rgba(14,165,233,0.4)}
.corner-br{bottom:20px;right:20px;border-bottom:1px solid rgba(245,158,11,0.4);border-right:1px solid rgba(245,158,11,0.4)}
.cursor{position:fixed;width:12px;height:12px;background:var(--blue-bright);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;box-shadow:0 0 20px var(--blue)}
.cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(14,165,233,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.15s}
.glow-left{position:fixed;top:20%;left:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(14,165,233,0.1) 0%,transparent 70%);pointer-events:none;z-index:1;animation:pulse 4s ease-in-out infinite}
.glow-right{position:fixed;bottom:20%;right:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,0.08) 0%,transparent 70%);pointer-events:none;z-index:1;animation:pulse 4s ease-in-out infinite 2s}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.login-box{position:relative;z-index:10;width:100%;max-width:440px;padding:0 20px}
.logo{text-align:center;margin-bottom:40px}
.logo-text{font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--blue-bright),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:0.7rem;letter-spacing:0.3em;color:var(--muted);margin-top:8px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border:1px solid rgba(14,165,233,0.3);border-radius:12px;font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--blue-bright);background:rgba(14,165,233,0.05);margin-bottom:16px}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--blue-bright);animation:blink 1.5s infinite;box-shadow:0 0 6px var(--blue)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

.card{background:rgba(3,7,18,0.9);border:1px solid var(--glass-border);border-radius:4px;padding:36px;backdrop-filter:blur(30px);box-shadow:0 0 60px rgba(14,165,233,0.08),0 30px 80px rgba(0,0,0,0.5)}
.card-title{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;letter-spacing:0.05em;margin-bottom:4px}
.card-sub{font-size:0.9rem;color:var(--muted);margin-bottom:28px}
.form-group{margin-bottom:18px;position:relative}
.form-label{font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:8px}
.form-input{width:100%;padding:13px 16px;background:rgba(14,165,233,0.04);border:1px solid rgba(14,165,233,0.2);border-radius:2px;color:var(--white);font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none;transition:all 0.3s}
.form-input:focus{border-color:var(--blue-bright);box-shadow:0 0 0 3px rgba(14,165,233,0.08)}
.form-input::placeholder{color:rgba(148,163,184,0.4)}
.form-input.error{border-color:var(--red)}
.form-footer{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.form-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.85rem;color:var(--muted)}
.form-check input{width:14px;height:14px;accent-color:var(--blue-bright)}
.forgot-link{font-size:0.85rem;color:var(--blue-bright);text-decoration:none;font-family:'Share Tech Mono',monospace;font-size:0.7rem;letter-spacing:0.1em}
.forgot-link:hover{text-decoration:underline}
.btn-submit{width:100%;padding:14px;font-family:'Orbitron',monospace;font-size:0.8rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--black);background:linear-gradient(135deg,var(--gold),var(--gold-bright));border:none;border-radius:2px;cursor:pointer;box-shadow:0 0 25px rgba(245,158,11,0.3);transition:all 0.3s;position:relative;overflow:hidden}
.btn-submit::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);transition:left 0.5s}
.btn-submit:hover::before{left:100%}
.btn-submit:hover{box-shadow:0 0 40px rgba(245,158,11,0.5);transform:translateY(-1px)}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider-line{flex:1;height:1px;background:rgba(14,165,233,0.1)}
.divider-text{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:0.1em}
.register-link{text-align:center;font-size:0.9rem;color:var(--muted)}
.register-link a{color:var(--blue-bright);text-decoration:none;font-weight:600}
.register-link a:hover{text-decoration:underline}
.error-msg{padding:12px 16px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--red);margin-bottom:16px;display:none}
.loading-dots::after{content:'';animation:dots 1.5s infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scan-line"></div>
<div class="corner-tl"></div>
<div class="corner-br"></div>
<div class="glow-left"></div>
<div class="glow-right"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<div class="login-box">
  <div class="logo">
    <span class="logo-text">NEX<span style="color:var(--gold-bright)">VAULT</span></span>
    <div style="display:flex;justify-content:center;margin-top:12px">
      <div class="badge"><span class="badge-dot"></span>SECURE VAULT LOGIN · 2030</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Access Your Vault</div>
    <div class="card-sub">Enter your credentials to continue</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="email" placeholder="your@email.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div class="form-footer">
      <label class="form-check"><input type="checkbox" id="remember"/> Remember me</label>
      <a href="#" class="forgot-link">FORGOT PASSWORD?</a>
    </div>
    <button class="btn-submit" id="login-btn" onclick="login()">UNLOCK VAULT</button>
    <div class="divider"><div class="divider-line"></div><div class="divider-text">OR</div><div class="divider-line"></div></div>
    <div class="register-link">New to NexVault? <a href="/register">Create your vault →</a></div>
  </div>
</div>

<script>
// Cursor
const cursor = document.getElementById('cursor'), ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.style.left = mx+'px'; cursor.style.top = my+'px'; });
function animRing() { rx += (mx-rx)*0.12; ry += (my-ry)*0.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing); }
animRing();

// Particles
const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
const pts = Array.from({length:80}, () => ({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3, r:Math.random()*1.2+.3, p:Math.random()*Math.PI*2, c:Math.random()>.7?'#f59e0b':'#0ea5e9' }));
function drawPts() { ctx.clearRect(0,0,canvas.width,canvas.height); pts.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.p+=.01; if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height} ctx.save();ctx.globalAlpha=Math.sin(p.p)*.3+.4;ctx.fillStyle=p.c;ctx.shadowBlur=6;ctx.shadowColor=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore(); }); requestAnimationFrame(drawPts); }
drawPts();

// Enter key login
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');

  if (!email || !password) { showError('Please enter your email and password.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots">AUTHENTICATING</span>';
  errEl.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (res.ok && data.token) {
      localStorage.setItem('nexvault_token', data.token);
      localStorage.setItem('nexvault_user', JSON.stringify(data.user));
      window.location.href = '/dashboard';
    } else {
      showError(data.message || 'Invalid credentials. Please try again.');
    }
  } catch (e) {
    showError('Connection error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'UNLOCK VAULT';
  }
}

function showError(msg) {
  const e = document.getElementById('error-msg');
  e.textContent = '⚠ ' + msg;
  e.style.display = 'block';
}
</script>
</body>
</html>
