<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexVault — Create Your Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--black:#010208;--blue:#0ea5e9;--blue-bright:#38bdf8;--gold:#f59e0b;--gold-bright:#fbbf24;--white:#f0f9ff;--muted:#94a3b8;--glass-border:rgba(14,165,233,0.2);--red:#ef4444;--green:#22c55e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;cursor:none;padding:80px 20px}
#particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.grid-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(14,165,233,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.03) 1px,transparent 1px);background-size:60px 60px}
.scan-line{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);opacity:0.3;z-index:2;pointer-events:none;animation:scan 8s linear infinite}
@keyframes scan{0%{top:0;opacity:0.3}90%{opacity:0.3}100%{top:100vh;opacity:0}}
.corner-tl{position:fixed;top:20px;left:20px;width:60px;height:60px;border-top:1px solid rgba(14,165,233,0.4);border-left:1px solid rgba(14,165,233,0.4);pointer-events:none;z-index:2}
.corner-br{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-bottom:1px solid rgba(245,158,11,0.4);border-right:1px solid rgba(245,158,11,0.4);pointer-events:none;z-index:2}
.glow-left{position:fixed;top:20%;left:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(14,165,233,0.1) 0%,transparent 70%);pointer-events:none;z-index:1;animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.cursor{position:fixed;width:12px;height:12px;background:var(--blue-bright);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;box-shadow:0 0 20px var(--blue)}
.cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(14,165,233,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.15s}
.register-box{position:relative;z-index:10;width:100%;max-width:480px}
.logo{text-align:center;margin-bottom:32px}
.logo-text{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--blue-bright),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:0.25em;color:var(--muted);margin-top:8px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border:1px solid rgba(14,165,233,0.3);border-radius:12px;font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--blue-bright);background:rgba(14,165,233,0.05);margin-top:10px}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;box-shadow:0 0 6px var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.card{background:rgba(3,7,18,0.92);border:1px solid var(--glass-border);border-radius:4px;padding:36px;backdrop-filter:blur(30px);box-shadow:0 0 60px rgba(14,165,233,0.07),0 30px 80px rgba(0,0,0,0.5)}
.card-title{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;margin-bottom:4px}
.card-sub{font-size:0.9rem;color:var(--muted);margin-bottom:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:16px}
.form-label{font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:7px}
.form-input{width:100%;padding:12px 16px;background:rgba(14,165,233,0.04);border:1px solid rgba(14,165,233,0.2);border-radius:2px;color:var(--white);font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none;transition:all 0.3s}
.form-input:focus{border-color:var(--blue-bright);box-shadow:0 0 0 3px rgba(14,165,233,0.08)}
.form-input::placeholder{color:rgba(148,163,184,0.4)}
.form-input.error{border-color:var(--red)}
.strength-bar{display:flex;gap:4px;margin-top:8px}
.strength-seg{height:3px;flex:1;border-radius:2px;background:rgba(14,165,233,0.1);transition:background 0.3s}
.strength-label{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--muted);margin-top:4px}
.terms-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:20px;font-size:0.85rem;color:var(--muted);cursor:pointer}
.terms-row input{width:14px;height:14px;margin-top:2px;accent-color:var(--blue-bright);flex-shrink:0}
.terms-row a{color:var(--blue-bright);text-decoration:none}
.referral-row{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(14,165,233,0.03);border:1px solid rgba(14,165,233,0.12);border-radius:2px;margin-bottom:16px;font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--muted)}
.btn-submit{width:100%;padding:14px;font-family:'Orbitron',monospace;font-size:0.8rem;font-weight:700;letter-spacing:0.2em;color:var(--black);background:linear-gradient(135deg,var(--gold),var(--gold-bright));border:none;border-radius:2px;cursor:pointer;box-shadow:0 0 25px rgba(245,158,11,0.3);transition:all 0.3s;position:relative;overflow:hidden}
.btn-submit::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);transition:left 0.5s}
.btn-submit:hover::before{left:100%}
.btn-submit:hover{box-shadow:0 0 40px rgba(245,158,11,0.5);transform:translateY(-1px)}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.login-link{text-align:center;font-size:0.9rem;color:var(--muted);margin-top:20px}
.login-link a{color:var(--blue-bright);text-decoration:none;font-weight:600}
.error-msg{padding:12px 16px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--red);margin-bottom:14px;display:none}
.success-msg{padding:12px 16px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--green);margin-bottom:14px;display:none}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scan-line"></div>
<div class="corner-tl"></div>
<div class="corner-br"></div>
<div class="glow-left"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<div class="register-box">
  <div class="logo">
    <div class="logo-text">NEX<span style="color:var(--gold-bright)">VAULT</span></div>
    <div class="logo-sub">NEXT GENERATION WEALTH VAULT</div>
    <div style="display:flex;justify-content:center"><div class="badge"><span class="badge-dot"></span>FREE TO JOIN · NO HIDDEN FEES</div></div>
  </div>
  <div class="card">
    <div class="card-title">Create Your Vault</div>
    <div class="card-sub">Join 2,847 elite investors in 2 minutes</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-input" id="first-name" placeholder="John"/></div>
      <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-input" id="last-name" placeholder="Doe"/></div>
    </div>
    <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-input" id="email" placeholder="your@email.com" autocomplete="email"/></div>
    
    <div class="form-group"><label class="form-label">Country</label><input type="text" class="form-input" id="country" placeholder="Your country"/></div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="Min 8 characters" oninput="checkStrength(this.value)"/>
      <div class="strength-bar"><div class="strength-seg" id="s1"></div><div class="strength-seg" id="s2"></div><div class="strength-seg" id="s3"></div><div class="strength-seg" id="s4"></div></div>
      <div class="strength-label" id="strength-label">Enter password</div>
    </div>
    <div class="form-group"><label class="form-label">Confirm Password</label><input type="password" class="form-input" id="confirm-password" placeholder="Repeat password"/></div>
    <div id="ref-display" class="referral-row" style="display:none">🔗 Referred by: <span id="ref-code-display" style="color:var(--blue-bright)"></span></div>
    <div class="form-group"><label class="form-label">Referral Code (Optional)</label><input type="text" class="form-input" id="referral-code" placeholder="Enter referral code" style="text-transform:uppercase"/></div>
    <label class="terms-row"><input type="checkbox" id="terms"/>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
    <div class="form-group" id="captcha-box" style="margin-bottom:20px">
  <label class="form-label">SECURITY CHECK</label>
  <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(14,165,233,0.04);border:1px solid rgba(14,165,233,0.2);border-radius:2px">
    <span id="captcha-question" style="font-family:'Share Tech Mono',monospace;font-size:1rem;color:#38bdf8;font-weight:700;min-width:80px"></span>
    <span style="color:#94a3b8;font-size:0.9rem">= ?</span>
    <input id="captcha-answer" type="number" placeholder="Answer" style="flex:1;padding:8px 12px;background:rgba(14,165,233,0.04);border:1px solid rgba(14,165,233,0.2);border-radius:2px;color:#f0f9ff;font-family:monospace;font-size:1rem;outline:none;-moz-appearance:textfield" />
    <button type="button" onclick="refreshCaptcha()" style="padding:6px 10px;background:transparent;border:1px solid rgba(14,165,233,0.2);border-radius:2px;color:#94a3b8;cursor:pointer;font-size:0.8rem" title="New question">↻</button>
  </div>
  <div id="captcha-error" style="color:#ef4444;font-family:monospace;font-size:0.7rem;margin-top:6px;display:none">✗ Incorrect answer. Please try again.</div>
</div>
<button class="btn-submit" id="register-btn" onclick="register()">INITIALIZE MY VAULT</button>
  </div>
  <div class="login-link">Already have a vault? <a href="/login">Sign in →</a></div>
</div>

<script>
const cursor = document.getElementById('cursor'), ring = document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
function animRing(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);}
animRing();

const canvas=document.getElementById('particle-canvas'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
const pts=Array.from({length:70},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.2+.3,p:Math.random()*Math.PI*2,c:Math.random()>.7?'#f59e0b':'#0ea5e9'}));
function drawPts(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.p+=.01;if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height){p.x=Math.random()*canvas.width;p.y=Math.random()*canvas.height;}ctx.save();ctx.globalAlpha=Math.sin(p.p)*.3+.4;ctx.fillStyle=p.c;ctx.shadowBlur=6;ctx.shadowColor=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();});requestAnimationFrame(drawPts);}
drawPts();

// Check referral code from URL
const urlRef = new URLSearchParams(window.location.search).get('ref');
if (urlRef) {
  document.getElementById('referral-code').value = urlRef.toUpperCase();
  document.getElementById('ref-code-display').textContent = urlRef.toUpperCase();
  document.getElementById('ref-display').style.display = 'flex';
}

function checkStrength(pw) {
  const segs = [document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3'),document.getElementById('s4')];
  const label = document.getElementById('strength-label');
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#ef4444','#f59e0b','#22c55e','#38bdf8'];
  const labels = ['Weak','Fair','Good','Strong'];
  segs.forEach((s,i) => s.style.background = i < score ? colors[score-1] : 'rgba(14,165,233,0.1)');
  label.textContent = score > 0 ? labels[score-1] : 'Enter password';
  label.style.color = score > 0 ? colors[score-1] : 'var(--muted)';
}

async function register() {
  if(!verifyCaptcha()) return;
  const firstName = document.getElementById('first-name').value.trim();
  const lastName = document.getElementById('last-name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const country = document.getElementById('country').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm-password').value;
  const refCode = document.getElementById('referral-code').value.trim();
  const terms = document.getElementById('terms').checked;
  const btn = document.getElementById('register-btn');

  if (!firstName||!lastName) { showError('Please enter your full name.'); return; }
  if (!email) { showError('Please enter your email address.'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (password !== confirm) { showError('Passwords do not match.'); return; }
  if (!terms) { showError('Please accept the Terms of Service to continue.'); return; }

  btn.disabled = true; btn.textContent = 'INITIALIZING VAULT...';
  document.getElementById('error-msg').style.display = 'none';

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ full_name: `${firstName} ${lastName}`, email, phone, country, password, referral_code: refCode || undefined })
    });
    const data = await res.json();
    if (res.ok && data.token) {
      localStorage.setItem('nexvault_token', data.token);
      localStorage.setItem('nexvault_user', JSON.stringify(data.user));
      document.getElementById('success-msg').textContent = '✓ Vault created! Redirecting to dashboard...';
      document.getElementById('success-msg').style.display = 'block';
      setTimeout(() => window.location.href = '/dashboard', 1500);
    } else { showError(data.message || 'Registration failed. Please try again.'); }
  } catch (e) { showError('Connection error. Please try again.'); }
  finally { btn.disabled = false; btn.textContent = 'INITIALIZE MY VAULT'; }
}

function showError(msg) {
  const e = document.getElementById('error-msg');
  e.textContent = '⚠ ' + msg; e.style.display = 'block';
}

var _cA = 0, _cB = 0, _cOp = '+';
function refreshCaptcha() {
  _cA = Math.floor(Math.random()*15)+1;
  _cB = Math.floor(Math.random()*15)+1;
  var ops = ['+','-','×'];
  _cOp = ops[Math.floor(Math.random()*ops.length)];
  if(_cOp==='-' && _cB>_cA){ var t=_cA;_cA=_cB;_cB=t; }
  document.getElementById('captcha-question').textContent = _cA+' '+_cOp+' '+_cB;
  var inp = document.getElementById('captcha-answer');
  if(inp) inp.value='';
  var err = document.getElementById('captcha-error');
  if(err) err.style.display='none';
}
function verifyCaptcha() {
  var ans = parseInt(document.getElementById('captcha-answer').value);
  var correct;
  if(_cOp==='+') correct=_cA+_cB;
  else if(_cOp==='-') correct=_cA-_cB;
  else correct=_cA*_cB;
  if(ans!==correct){
    document.getElementById('captcha-error').style.display='block';
    refreshCaptcha();
    return false;
  }
  return true;
}
window.addEventListener('DOMContentLoaded', refreshCaptcha);
</script>
</body>
</html>
